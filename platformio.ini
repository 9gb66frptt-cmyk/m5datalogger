; ─── Base commune ────────────────────────────────────────────
[env]
platform = espressif32@6.5.0
board = m5stack-cores3
framework = arduino
monitor_speed = 115200

build_flags =
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ─── Firmware datalogger RS-232 + provisioning QR ─────────────
[env:m5stack-cores3]
build_src_filter = +<main_datalogger.cpp>

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    https://github.com/m5stack/M5Module-QRCode
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0

; ─── Firmware datalogger BLE (provisioning Bluetooth, sans accessoire) ────
[env:datalogger-ble]
build_src_filter = +<main_datalogger_ble.cpp>

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
    h2zero/NimBLE-Arduino @ ^1.4.1

; ─── Firmware datalogger RS-232 + buffer LittleFS (variant resilience) ────
; Identique à m5stack-cores3 mais avec persistance LittleFS des cycles
; non publiés (réseau down). Voir BUFFER.md pour la doc.
[env:datalogger-buffered]
build_src_filter = +<main_datalogger_buffered.cpp>
board_build.filesystem = littlefs

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    https://github.com/m5stack/M5Module-QRCode
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0

; ─── Firmware datalogger RS-232 + buffer LittleFS + QoS 1 (arduino-mqtt) ────
; Variante propre QoS 1 utilisant 256dpi/arduino-mqtt (qui supporte vraiment
; QoS 1 publish, contrairement à PubSubClient). WiFiClientSecure setInsecure
; pour le TLS — politique inchangée vs version buffered.
[env:datalogger-qos1]
build_src_filter = +<main_datalogger_qos1.cpp>
board_build.filesystem = littlefs

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    https://github.com/m5stack/M5Module-QRCode
    bblanchon/ArduinoJson @ ^7.0.0
    256dpi/MQTT @ ^2.5.2

